name: Contribution Scope

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  resource-scope:
    name: Resource contribution scope
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check contribution scope
        run: node scripts/check-contribution-scope.mjs
